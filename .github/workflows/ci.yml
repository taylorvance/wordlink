name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    uses: taylorvance/tv-shared/.github/workflows/verify.yml@v1
    with:
      node-version: '22'
      working-directory: .
      install-command: npm ci
      lint-command: npm run lint
      test-command: npm run test
      build-command: npm run build
